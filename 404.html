<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>404 - The Caliper Log</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .not-found {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      text-align: center;
    }

    .not-found h1 {
      margin: 0;
      color: var(--accent);
      font-size: clamp(100px, 24vw, 260px);
      font-weight: 700;
      letter-spacing: -.08em;
      line-height: .85;
    }

    .not-found p {
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main class="not-found">
    <div>
      <p class="eyebrow">PAGE NOT FOUND</p>
      <h1>404</h1>
      <p>Under construction.</p>
      <a class="text-link" href="./">Return to The Caliper Log &rarr;</a>
    </div>
  </main>
</body>
</html>
